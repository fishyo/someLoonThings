name: "节点信息"
description: "手动触发查询指定节点的外网 IPv4/IPv6 地址、地理位置及运营商信息。双栈竞速查询，支持本地 GeoIP 及在线 API 补充。"
author: "fishyo"
homepage: "https://github.com/fishyo/someLoonThings"
icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Area.png"

scriptings:
  - generic:
      name: "节点信息"
      script_url: "https://raw.githubusercontent.com/fishyo/someLoonThings/main/script/nodeInfoCheck/nodeIpInfo.js"
      env:
        NODE_NAME: "Proxy" # 可选，默认为空，您可以随时覆写该环境变量指定策略组/节点
